name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Lint
      run: npm run lint

    - name: Build
      run: npm run build

    - name: Run Unit Tests
      run: npm test

    - name: Run E2E Tests
      run: npm run test:e2e
      env:
        DATABASE_URL: "file:./test.db"
        JWT_SECRET: "test-secret"
